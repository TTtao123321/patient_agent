spring:
  application:
    name: backend-springboot

  datasource:
    url: jdbc:mysql://101.126.81.197:3307/patient_agent?useSSL=false&serverTimezone=UTC
    username: root
    password: 123456

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  data:
    redis:
      host: 101.126.81.197
      port: 6389
      password: 123456

  rabbitmq:
    host: 101.126.81.197
    port: 5672
    username: admin
    password: admin

agent:
  base-url: http://localhost:8000

app:
  monitoring:
    slow-request-ms: 1200
    slow-agent-call-ms: 1500

logging:
  level:
    root: INFO
    com.patientagent: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [traceId=%X{traceId:-}] %logger{36} - %msg%n"

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
